<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond bleu arrondi -->
  <rect width="512" height="512" rx="110" fill="#2563eb"/>
  <!-- Cercle blanc de l'horloge -->
  <circle cx="256" cy="256" r="165" fill="white"/>
  <!-- Contour horloge -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="#e2e8f0" stroke-width="10"/>
  <!-- Traits des heures -->
  <line x1="256" y1="110" x2="256" y2="135" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <line x1="402" y1="256" x2="377" y2="256" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <line x1="256" y1="402" x2="256" y2="377" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <line x1="110" y1="256" x2="135" y2="256" stroke="#94a3b8" stroke-width="12" stroke-linecap="round"/>
  <!-- Aiguille heure (vers 10h) -->
  <line x1="256" y1="256" x2="200" y2="186" stroke="#1e293b" stroke-width="18" stroke-linecap="round"/>
  <!-- Aiguille minutes (vers 2h) -->
  <line x1="256" y1="256" x2="316" y2="165" stroke="#2563eb" stroke-width="13" stroke-linecap="round"/>
  <!-- Centre -->
  <circle cx="256" cy="256" r="14" fill="#2563eb"/>
  <!-- Coche verte en bas à droite -->
  <circle cx="368" cy="368" r="72" fill="#10b981"/>
  <polyline points="334,368 356,390 402,342" fill="none" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
